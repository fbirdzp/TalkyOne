# GitHub Actions Deploy to Test Environment
# 部署到测试环境（develop 分支）

name: Deploy to Test

on:
  push:
    branches: [develop]

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build Docker image
        run: |
          docker build -t talkyone:test .

      - name: 🚀 Deploy to Test Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          script: |
            cd /opt/talkyone
            docker-compose pull
            docker-compose up -d
            docker-compose ps

      - name: 🔔 Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Test 环境部署完成 ✅'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
